<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rhafes Laundry – Hotel Laundry Management</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F0F4F8;color:#1a2744;min-height:100vh}
:root{
  --navy:#0F1B35;--navy2:#162040;--navy3:#1E2D52;
  --green:#00C896;--green2:#00A87E;
  --amber:#F59E0B;--red:#EF4444;--blue:#3B82F6;--purple:#8B5CF6;
  --white:#FFFFFF;--surface:#F8FAFC;--border:#E2E8F0;
  --text:#1a2744;--muted:#64748B;--light:#94A3B8;
  --wa:#25D366;
}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#f1f1f1}::-webkit-scrollbar-thumb{background:#c1c9d6;border-radius:3px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}70%{box-shadow:0 0 0 10px rgba(239,68,68,0)}}
.fade-in{animation:fadeIn .35s ease both}
.slide-in{animation:slideIn .3s ease both}
/* Layout */
.app-shell{display:flex;min-height:100vh}
.sidebar{width:260px;background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .3s ease}
.sidebar-logo{padding:24px 24px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-logo h1{font-size:19px;font-weight:800;color:#fff;letter-spacing:-.3px}
.sidebar-logo p{font-size:11px;color:rgba(255,255,255,.4);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-section{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.28);padding:12px 12px 5px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;color:rgba(255,255,255,.62);font-size:14px;font-weight:500;margin-bottom:2px;transition:all .2s;user-select:none}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:var(--green);color:#fff}
.nav-item svg{width:17px;height:17px;flex-shrink:0}
.sidebar-footer{padding:14px;border-top:1px solid rgba(255,255,255,.08)}
.user-chip{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,.07);border-radius:8px}
.user-avatar{width:34px;height:34px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
.user-name{font-size:13px;font-weight:600;color:#fff}
.user-role{font-size:11px;color:rgba(255,255,255,.38)}
.main{flex:1;margin-left:260px;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 26px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-size:19px;font-weight:700;color:var(--text)}
.topbar-actions{display:flex;align-items:center;gap:12px}
.content{padding:26px;flex:1}
/* Cards */
.card{background:#fff;border-radius:16px;border:1px solid var(--border);padding:22px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
/* Stat cards */
.stat-card{background:#fff;border-radius:14px;border:1px solid var(--border);padding:18px;display:flex;flex-direction:column;gap:7px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.stat-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:3px}
.stat-value{font-size:26px;font-weight:800;line-height:1}
.stat-label{font-size:12px;color:var(--muted);font-weight:500}
/* Machine cards */
.machine-card{background:#fff;border-radius:18px;border:2px solid var(--border);padding:22px;transition:all .25s;box-shadow:0 2px 8px rgba(0,0,0,.05);position:relative;overflow:hidden}
.machine-card.available{border-color:#d1fae5;cursor:pointer}
.machine-card.busy{border-color:#fee2e2}
.machine-card.finishing{border-color:#fef3c7}
.machine-card.pickup{border-color:#fecaca;animation:blink 2s infinite}
.machine-card.available:hover{box-shadow:0 4px 20px rgba(0,200,150,.15);transform:translateY(-2px)}
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.status-badge.available{background:#d1fae5;color:#059669}
.status-badge.busy{background:#fee2e2;color:#dc2626}
.status-badge.finishing{background:#fef3c7;color:#d97706}
.status-badge.pickup{background:#fee2e2;color:#dc2626}
.status-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
.status-dot.pulse{animation:pulse 1.4s ease infinite}
/* Progress ring */
.progress-ring-container{position:relative;margin:0 auto}
.progress-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:70px}
/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 18px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;user-select:none;white-space:nowrap;font-family:inherit}
.btn-lg{padding:14px 26px;font-size:15px;border-radius:12px}
.btn-sm{padding:7px 13px;font-size:12px;border-radius:8px}
.btn-xs{padding:5px 10px;font-size:11px;border-radius:7px}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{background:var(--navy2)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:var(--green2)}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{background:#dc2626}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface);color:var(--text)}
.btn-amber{background:var(--amber);color:#fff}
.btn-amber:hover{background:#d97706}
.btn-wa{background:var(--wa);color:#fff}
.btn-wa:hover{background:#1da851}
.btn-purple{background:var(--purple);color:#fff}
.btn-purple:hover{background:#7c3aed}
.btn:disabled{opacity:.5;cursor:not-allowed}
/* Forms */
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.form-label{font-size:13px;font-weight:600;color:var(--text)}
.form-input{padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);font-size:14px;font-family:inherit;color:var(--text);background:#fff;transition:border-color .2s;outline:none}
.form-input:focus{border-color:var(--navy)}
.form-input::placeholder{color:var(--light)}
/* Duration grid */
.dur-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.dur-btn{padding:11px 6px;border:2px solid var(--border);border-radius:10px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);background:#fff;transition:all .2s;user-select:none;line-height:1.2}
.dur-btn:hover{border-color:var(--navy);color:var(--navy)}
.dur-btn.selected{border-color:var(--navy);background:var(--navy);color:#fff}
/* Tables */
.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse}
th{background:#f8fafc;padding:11px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border)}
td{padding:12px 14px;font-size:13px;border-bottom:1px solid #f1f5f9;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbff}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(15,27,53,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(4px)}
.modal{background:#fff;border-radius:20px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:fadeIn .22s ease both;max-height:90vh;overflow-y:auto}
.modal-wide{max-width:560px}
.modal-header{padding:22px 22px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.modal-title{font-size:17px;font-weight:700;line-height:1.3}
.modal-body{padding:18px 22px}
.modal-footer{padding:0 22px 22px;display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
.close-btn{width:30px;height:30px;border-radius:50%;border:none;background:#f1f5f9;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .2s;flex-shrink:0}
.close-btn:hover{background:#e2e8f0}
/* Toast */
.toast-container{position:fixed;top:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:9px;pointer-events:none}
.toast{background:#fff;border-radius:12px;padding:13px 16px;box-shadow:0 6px 28px rgba(0,0,0,.16);display:flex;align-items:flex-start;gap:11px;max-width:320px;animation:slideIn .28s ease both;border-left:4px solid;pointer-events:all}
.toast.success{border-color:var(--green)}
.toast.error{border-color:var(--red)}
.toast.info{border-color:var(--blue)}
.toast.warning{border-color:var(--amber)}
.toast-msg{font-size:13px;font-weight:500;line-height:1.45}
/* Notif items */
.notif-dot{width:8px;height:8px;background:var(--red);border-radius:50%;position:absolute;top:2px;right:2px}
.notif-item{padding:13px 16px;border-bottom:1px solid #f1f5f9;display:flex;gap:11px;align-items:flex-start;cursor:pointer;transition:background .15s}
.notif-item:hover{background:#f8fafc}
.notif-item.unread{background:#f0f9ff}
.notif-item:last-child{border-bottom:none}
/* Login */
.login-page{min-height:100vh;display:flex}
.login-left{flex:1;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;position:relative;overflow:hidden}
.login-left::before{content:'';position:absolute;top:-100px;right:-100px;width:400px;height:400px;border-radius:50%;background:rgba(0,200,150,.07)}
.login-right{width:460px;background:#fff;display:flex;align-items:center;justify-content:center;padding:40px}
.mp-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:13px}
.mp-card-name{font-size:11px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.mp-card-status{font-size:13px;font-weight:600}
.mp-card-status.avail{color:var(--green)}
.mp-card-status.busy{color:#fca5a5}
/* Homepage */
.homepage{min-height:100vh;background:var(--navy);color:#fff;display:flex;flex-direction:column}
.hp-nav{padding:18px 36px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.08)}
.hp-hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:56px 20px}
.hp-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(0,200,150,.15);border:1px solid rgba(0,200,150,.28);color:var(--green);border-radius:20px;padding:5px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:22px}
.hp-title{font-size:clamp(34px,7vw,70px);font-weight:800;line-height:1.06;letter-spacing:-1.5px}
.hp-title span{color:var(--green)}
.hp-sub{font-size:17px;color:rgba(255,255,255,.52);margin-top:14px;max-width:480px}
.hp-machines{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:46px;width:100%;max-width:760px}
.hp-machine{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:13px;padding:16px;text-align:center}
.hp-machine-name{font-size:11px;color:rgba(255,255,255,.42);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.hp-footer{padding:24px 36px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
/* Tabs */
.tabs{display:flex;gap:3px;background:#f1f5f9;border-radius:12px;padding:4px;margin-bottom:18px}
.tab{flex:1;text-align:center;padding:8px 12px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .2s;user-select:none}
.tab.active{background:#fff;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08)}
/* Section */
.section-title{font-size:21px;font-weight:800;margin-bottom:3px}
.section-sub{font-size:13px;color:var(--muted);margin-bottom:22px}
/* Chips */
.chip{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.chip-navy{background:#e8edf7;color:var(--navy)}
.chip-green{background:#d1fae5;color:#059669}
.chip-red{background:#fee2e2;color:#dc2626}
.chip-amber{background:#fef3c7;color:#d97706}
.chip-purple{background:#ede9fe;color:#7c3aed}
/* Pickup alert bar */
.pickup-bar{background:linear-gradient(135deg,#fef2f2,#fff5f5);border:1.5px solid #fecaca;border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:16px}
/* Hamburger */
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px}
.hamburger span{width:21px;height:2px;background:var(--muted);border-radius:2px;display:block}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
/* WhatsApp */
.wa-preview{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:14px 16px;font-size:13px;color:#166534;line-height:1.6;margin-top:12px;font-style:italic}
/* Responsive */
@media(max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:repeat(2,1fr)}.hp-machines{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}.main{margin-left:0}.hamburger{display:flex}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}.content{padding:14px}.topbar{padding:0 14px}
  .login-page{flex-direction:column}.login-left{display:none}.login-right{width:100%;padding:28px 20px}
  .dur-grid{grid-template-columns:repeat(3,1fr)}.hp-nav{padding:14px 18px}
  .hp-footer{flex-direction:column;text-align:center}.modal-footer{justify-content:stretch}
  .modal-footer .btn{flex:1}
}
@media(max-width:480px){.dur-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

// ─── TOAST ────────────────────────────────────────────────────────────────────
let _addToast=null;
const ToastContainer=()=>{
  const[toasts,set]=useState([]);
  _addToast=(msg,type='info')=>{const id=uid();set(p=>[...p,{id,msg,type}]);setTimeout(()=>set(p=>p.filter(t=>t.id!==id)),4500);};
  const cols={success:'#00C896',error:'#EF4444',info:'#3B82F6',warning:'#F59E0B'};
  return <div className="toast-container">{toasts.map(t=><div key={t.id} className={`toast ${t.type}`}><span style={{color:cols[t.type],flexShrink:0}}><I n={t.type==='success'?'check':t.type==='error'?'x':'bell'} s={17}/></span><span className="toast-msg">{t.msg}</span></div>)}</div>;
};
const toast=(m,t)=>_addToast&&_addToast(m,t);

// ─── APP ──────────────────────────────────────────────────────────────────────
const App=()=>{
  const[page,setPage]=useState('home');
  const[user,setUser]=useState(()=>LS.get('user',null));
  const[users,setUsers]=useState([]);
  const[sessions,setSessions]=useState({});
  const[history,setHistory]=useState([]);
  const[notifs,setNotifs]=useState([]);
  const[modal,setModal]=useState(null);
  const[sidebarOpen,setSidebarOpen]=useState(false);
  const[tick,setTick]=useState(0);
  const remindersRef=useRef(LS.get('reminders',{}));

  // 1. Live Sync Users from Firestore
  useEffect(() => {
    const unsubscribe = db.collection('users').onSnapshot((snapshot) => {
      const usersList = [];
      snapshot.forEach((doc) => {
        usersList.push({ id: doc.id, ...doc.data() });
      });
      // If Firestore is empty (first run), seed the Admin account
      if (usersList.length === 0) {
        const adminUser = { username:'admin', password:'admin123', name:'Admin User', role:'admin', department:'Management', phone:'' };
        db.collection('users').doc('admin').set(adminUser);
      } else {
        setUsers(usersList);
        // Sync currently logged-in user if their info changed in DB
        if (user) {
          const currentUpdated = usersList.find(u => u.id === user.id);
          if (currentUpdated) setUser(currentUpdated);
        }
      }
    });
    return () => unsubscribe();
  }, [user?.id]);

  // 2. Live Sync Active Machine Sessions from Firestore
  useEffect(() => {
    const unsubscribe = db.collection('sessions').onSnapshot((snapshot) => {
      const activeSessions = {};
      snapshot.forEach((doc) => {
        activeSessions[doc.id] = doc.data();
      });
      setSessions(activeSessions);
    });
    return () => unsubscribe();
  }, []);

  // 3. Live Sync Activity History from Firestore
  useEffect(() => {
    const unsubscribe = db.collection('history').orderBy('startTime', 'desc').onSnapshot((snapshot) => {
      const historyList = [];
      snapshot.forEach((doc) => {
        historyList.push({ id: doc.id, ...doc.data() });
      });
      setHistory(historyList);
    });
    return () => unsubscribe();
  }, []);

  // 4. Live Sync Notifications from Firestore
  useEffect(() => {
    const unsubscribe = db.collection('notifications').orderBy('time', 'desc').onSnapshot((snapshot) => {
      const notifList = [];
      snapshot.forEach((doc) => {
        notifList.push({ id: doc.id, ...doc.data() });
      });
      setNotifs(notifList);
    });
    return () => unsubscribe();
  }, []);

  useEffect(()=>{if(user)LS.set('user',user);},[user]);

  // 1-second tick loop
  useEffect(()=>{const t=setInterval(()=>setTick(p=>p+1),1000);return()=>clearInterval(t);},[]);

  // Check finishes & send reminders every 5 min
  useEffect(()=>{
    const now=Date.now();
    Object.entries(sessions).forEach(([mid,s])=>{
      if(!s)return;
      const secs=timeLeft(s.endTime);
      // Just finished → update state and push Firestore Notification
      if(secs===0&&!s.notified){
        db.collection('sessions').doc(mid).update({ notified: true, status: 'pickup' });
        
        const n={ userId:s.userId, machineId:mid, msg:`🔔 Your laundry on ${s.machineName} is done! Please collect your clothes.`, time:now, read:false, type:'finish' };
        db.collection('notifications').add(n);
        
        if(s.userId===user?.id) toast(n.msg,'info');
        remindersRef.current={...remindersRef.current,[mid]:now};
        LS.set('reminders',remindersRef.current);
      }
      // Reminder every 5 min for pickup status
      if(s.status==='pickup'&&secs===0){
        const lastR=remindersRef.current[mid]||0;
        if(now-lastR>=300000){
          const n={ userId:s.userId, machineId:mid, msg:`⏰ Reminder: Your clothes on ${s.machineName} are still waiting to be collected.`, time:now, read:false, type:'reminder' };
          db.collection('notifications').add(n);
          
          if(s.userId===user?.id) toast(n.msg,'warning');
          remindersRef.current={...remindersRef.current,[mid]:now};
          LS.set('reminders',remindersRef.current);
        }
      }
    });
  },[tick, sessions]);

  const myNotifs=notifs.filter(n=>n.userId===user?.id);
  const unread=myNotifs.filter(n=>!n.read).length;

  const login=(un,pw)=>{
    const u=users.find(u=>u.username===un&&u.password===pw);
    if(u){setUser(u);setPage('dashboard');toast(`Welcome, ${u.name.split(' ')[0]}!`,'success');return true;}
    return false;
  };
  
  const logout=()=>{setUser(null);setPage('home');LS.set('user',null);setSidebarOpen(false);};
  
  const startMachine=(mid,mname,durMin)=>{
    const now=Date.now();
    const s={userId:user.id,userName:user.name,userPhone:user.phone||'',machineName:mname,startTime:now,endTime:now+durMin*60000,durationMin:durMin,durationMs:durMin*60000,notified:false,status:'busy'};
    
    // Save to Firestore
    db.collection('sessions').doc(mid).set(s);
    db.collection('history').add({userId:user.id,userName:user.name,machineId:mid,machineName:mname,startTime:now,endTime:now+durMin*60000,durationMin:durMin,date:new Date().toISOString()});
    
    toast(`${mname} started! ${fmtDur(durMin)} cycle.`,'success');
  };
  
  const collectClothes=(mid)=>{
    const s=sessions[mid];
    // Delete session document from Firestore
    db.collection('sessions').doc(mid).delete();
    
    const rem={...remindersRef.current};delete rem[mid];remindersRef.current=rem;LS.set('reminders',rem);
    toast('Clothes collected — machine is now available.','success');
    
    // Mark related notifications as read in Firestore
    if(s) {
      db.collection('notifications')
        .where('machineId', '==', mid)
        .where('userId', '==', s.userId)
        .get()
        .then((querySnapshot) => {
          querySnapshot.forEach((doc) => {
            doc.ref.update({ read: true });
          });
        });
    }
  };
  
  const addUser=(u)=>{
    db.collection('users').add({...u, role:'employee'});
    toast('Account created.','success');
  };
  
  const editUser=(id,data)=>{
    db.collection('users').doc(id).update(data);
    toast('Account updated.','success');
  };
  
  const deleteUser=(id)=>{
    db.collection('users').doc(id).delete();
    toast('Account deleted.','info');
  };
  
  const changePassword=(id,pw)=>{
    db.collection('users').doc(id).update({password:pw});
    toast('Password updated.','success');
  };
  
  const markAllRead=()=>{
    db.collection('notifications').where('userId', '==', user?.id).get().then((snapshot) => {
      snapshot.forEach(doc => doc.ref.update({read: true}));
    });
  };
  
  const deleteNotif=(id)=>{
    db.collection('notifications').doc(id).delete();
  };
  
  const clearMyNotifs=()=>{
    db.collection('notifications').where('userId', '==', user?.id).get().then((snapshot) => {
      snapshot.forEach(doc => doc.ref.delete());
    });
  };
  
  const deleteHistory=(id)=>{
    db.collection('history').doc(id).delete();
    toast('Account deleted.','info');
  };
  
  const clearAllHistory=()=>{
    if(confirm("Are you sure you want to wipe all history data?")) {
      db.collection('history').get().then((snapshot) => {
        snapshot.forEach(doc => doc.ref.delete());
      });
      toast('History wiped.','info');
    }
  };

  const ctx={page,setPage,user,users,sessions,history,notifs,myNotifs,unread,tick,modal,setModal,
    login,logout,startMachine,collectClothes,addUser,editUser,deleteUser,changePassword,
    markAllRead,deleteNotif,clearMyNotifs,deleteHistory,clearAllHistory};

  if(page==='home')return <><ToastContainer/><HomePage ctx={ctx}/></>;
  if(!user)return <><ToastContainer/><LoginPage ctx={ctx}/></>;

  return(
    <>
      <ToastContainer/>
      <div className="app-shell">
        <div className={`sidebar-overlay${sidebarOpen?' open':''}`} onClick={()=>setSidebarOpen(false)}/>
        <Sidebar ctx={ctx} open={sidebarOpen} onClose={()=>setSidebarOpen(false)}/>
        <div className="main">
          <Topbar ctx={ctx} onMenu={()=>setSidebarOpen(true)}/>
          <div className="content fade-in" key={page}>
            {page==='dashboard'&&<DashboardPage ctx={ctx}/>}
            {page==='machines'&&<MachinesPage ctx={ctx}/>}
            {page==='history'&&<HistoryPage ctx={ctx}/>}
            {page==='notifications'&&<NotificationsPage ctx={ctx}/>}
            {page==='profile'&&<ProfilePage ctx={ctx}/>}
            {page==='admin-users'&&<AdminUsersPage ctx={ctx}/>}
            {page==='admin-dash'&&<AdminDashPage ctx={ctx}/>}
          </div>
        </div>
        {modal&&<ModalRouter ctx={ctx}/>}
      </div>
    </>
  );
};

    </div>

};

// ─── PROGRESS RING ─────────────────────────────────────────────────────────────
const Ring=({p,color,size=100})=>{
  const r=40,circ=2*Math.PI*r,off=circ-(p/100)*circ;
  return(
    <svg width={size} height={size} viewBox="0 0 100 100" style={{transform:'rotate(-90deg)'}}>
      <circle cx="50" cy="50" r={r} fill="none" stroke="#f1f5f9" strokeWidth="9"/>
      <circle cx="50" cy="50" r={r} fill="none" stroke={color} strokeWidth="9" strokeLinecap="round"
        strokeDasharray={circ} strokeDashoffset={off} style={{transition:'stroke-dashoffset .5s ease'}}/>
    </svg>
  );
};

// ─── WHATSAPP HELPER ──────────────────────────────────────────────────────────
const waMsg=(userName)=>`Hello ${userName}, I hope you are doing well. Your laundry cycle appears to be completed. I would like to use the machine. Could you please collect your clothes when possible? Thank you.`;
const openWA=(phone,name)=>{
  const msg=encodeURIComponent(waMsg(name));
  const num=phone?.replace(/\D/g,'');
  if(num)window.open(`https://wa.me/${num}?text=${msg}`,'_blank');
  else window.open(`https://wa.me/?text=${msg}`,'_blank');
};

// ─── MACHINE CARD ─────────────────────────────────────────────────────────────
const MachineCard=({machine,session,tick,onStart,onCollect,currentUser,onContact})=>{
  const secs=session?timeLeft(session.endTime):0;
  const isPickup=session&&(session.status==='pickup'||secs<=0);
  const isFinishing=session&&!isPickup&&secs<=300;
  const sk=!session?'available':isPickup?'pickup':isFinishing?'finishing':'busy';
  const color=sk==='available'?'#00C896':sk==='pickup'?'#EF4444':sk==='finishing'?'#F59E0B':'#EF4444';
  const p=session?pct(session.endTime,session.durationMs):0;
  const isMySession=session&&session.userId===currentUser?.id;
  const isAdmin=currentUser?.role==='admin';
  const canCollect=isMySession||isAdmin;

  return(
    <div className={`machine-card ${sk}`}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:14}}>
        <div>
          <div style={{fontSize:11,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5,marginBottom:3}}>{machine.type==='washer'?'Washer':'Dryer'} · #{machine.num}</div>
          <div style={{fontSize:16,fontWeight:700}}>{machine.name}</div>
        </div>
        <span className={`status-badge ${sk}`}>
          <span className={`status-dot${sk!=='available'?' pulse':''}`}/>
          {sk==='available'?'Available':sk==='pickup'?'Awaiting Pickup':sk==='finishing'?'Finishing':'In Use'}
        </span>
      </div>

      {session?(
        <>
          {isPickup&&(
            <div style={{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:11,padding:'10px 13px',marginBottom:12,fontSize:13,color:'#dc2626',fontWeight:500,textAlign:'center'}}>
              🔔 Cycle complete — please collect clothes
            </div>
          )}
          <div style={{position:'relative',width:96,height:96,margin:'0 auto 14px'}}>
            <Ring p={p} color={color} size={96}/>
            <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',textAlign:'center',width:66}}>
              <div style={{fontSize:isPickup?13:15,fontWeight:800,color,lineHeight:1}}>{isPickup?'Done':fmtSecs(secs)}</div>
              <div style={{fontSize:10,color:'var(--muted)',marginTop:1}}>{isPickup?'collect':'left'}</div>
            </div>
          </div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7,fontSize:12,marginBottom:14}}>
            <div style={{background:'var(--surface)',borderRadius:9,padding:'9px 11px'}}>
              <div style={{color:'var(--muted)',marginBottom:2}}>User</div>
              <div style={{fontWeight:700,fontSize:13,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{session.userName}</div>
            </div>
            <div style={{background:'var(--surface)',borderRadius:9,padding:'9px 11px'}}>
              <div style={{color:'var(--muted)',marginBottom:2}}>Duration</div>
              <div style={{fontWeight:700,fontSize:13}}>{fmtDur(session.durationMin)}</div>
            </div>
            <div style={{background:'var(--surface)',borderRadius:9,padding:'9px 11px'}}>
              <div style={{color:'var(--muted)',marginBottom:2}}>Started</div>
              <div style={{fontWeight:700,fontSize:13}}>{fmt(session.startTime)}</div>
            </div>
            <div style={{background:'var(--surface)',borderRadius:9,padding:'9px 11px'}}>
              <div style={{color:'var(--muted)',marginBottom:2}}>Ends at</div>
              <div style={{fontWeight:700,fontSize:13,color:isPickup?'var(--red)':'inherit'}}>{fmt(session.endTime)}</div>
            </div>
          </div>

          <div style={{display:'flex',flexDirection:'column',gap:7}}>
            {canCollect&&(
              <button className="btn btn-green" style={{width:'100%'}} onClick={()=>onCollect(machine.id)}>
                <I n="shirt" s={16}/>Clothes Collected ✓
              </button>
            )}
            {!isMySession&&isPickup&&(
              <button className="btn btn-wa" style={{width:'100%'}} onClick={()=>onContact(session)}>
                <I n="wa" s={16}/>Notify via WhatsApp
              </button>
            )}
            {!isMySession&&isPickup&&!session.userPhone&&(
              <button className="btn btn-ghost btn-sm" style={{width:'100%'}} onClick={()=>onContact(session)}>
                <I n="msg" s={14}/>Contact User
              </button>
            )}
          </div>
        </>
      ):(
        <div style={{textAlign:'center',padding:'20px 0'}}>
          <div style={{fontSize:34,marginBottom:8}}>{machine.icon}</div>
          <div style={{fontSize:13,color:'var(--muted)',marginBottom:14}}>Available — tap to start</div>
          <button className="btn btn-green" style={{width:'100%'}} onClick={onStart}><I n="plus" s={16}/>Start Cycle</button>
        </div>
      )}
    </div>
  );
};

                      <button className="btn btn-ghost btn-xs" onClick={()=>startEdit(u)}><I n="edit" s={13}/></button>
                      {u.role!=='admin'&&<>
                        <button className="btn btn-ghost btn-xs" onClick={()=>setRp({id:u.id,pass:'',name:u.name})} title="Reset password"><I n="key" s={13}/></button>
                        <button className="btn btn-ghost btn-xs" style={{color:'var(--red)'}} onClick={()=>{if(confirm(`Delete ${u.name}?`))deleteUser(u.id);}}><I n="trash" s={13}/></button>
                      </>}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {rp.id&&(
        <div className="modal-overlay" onClick={()=>setRp({id:null,pass:''})}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-header"><span className="modal-title">Reset Password — {rp.name}</span><button className="close-btn" onClick={()=>setRp({id:null,pass:''})}><I n="x" s={13}/></button></div>
            <div className="modal-body">
              <div className="form-group"><label className="form-label">New Password</label>
                <input className="form-input" type="password" value={rp.pass} onChange={e=>setRp(p=>({...p,pass:e.target.value}))} placeholder="Enter new password" autoFocus/>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={()=>setRp({id:null,pass:''})}>Cancel</button>
              <button className="btn btn-primary" onClick={()=>{if(rp.pass.length<6){toast('Min 6 chars','error');return;}changePassword(rp.id,rp.pass);setRp({id:null,pass:''});}}>Reset Password</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

// ─── ADMIN DASH ───────────────────────────────────────────────────────────────
const AdminDashPage=({ctx})=>{
  const{users,sessions,history,notifs}=ctx;
  const active=Object.values(sessions).filter(Boolean);
  const todayH=history.filter(h=>new Date(h.date).toDateString()===new Date().toDateString());
  const mu=MACHINES.map(m=>({...m,count:history.filter(h=>h.machineId===m.id).length,mins:history.filter(h=>h.machineId===m.id).reduce((a,h)=>a+h.durationMin,0)}));
  const mx=Math.max(1,...mu.map(m=>m.count));
  return(
    <div>
      <div className="section-title">Admin Dashboard</div>
      <div className="section-sub">System overview and analytics</div>
      <div className="grid-4" style={{marginBottom:22}}>
        {[
          {l:'Total Staff',v:users.length,icon:'users',c:'#8B5CF6',bg:'#ede9fe'},
          {l:'In Use',v:active.filter(s=>timeLeft(s.endTime)>0&&s.status!=='pickup').length,icon:'machine',c:'#EF4444',bg:'#fee2e2'},
          {l:'Awaiting Pickup',v:active.filter(s=>s.status==='pickup'||timeLeft(s.endTime)===0).length,icon:'shirt',c:'#F59E0B',bg:'#fef3c7'},
          {l:"Today's Cycles",v:todayH.length,icon:'chart',c:'#3B82F6',bg:'#dbeafe'},
        ].map(s=>(
          <div key={s.l} className="stat-card">
            <div className="stat-icon" style={{background:s.bg,color:s.c}}><I n={s.icon}/></div>
            <div className="stat-value" style={{color:s.c}}>{s.v}</div>
            <div className="stat-label">{s.l}</div>
          </div>
        ))}
      </div>
      <div className="grid-2" style={{marginBottom:22}}>
        <div className="card">
          <h3 style={{fontSize:14,fontWeight:700,marginBottom:14}}>Machine Usage</h3>
          {mu.map(m=>(
            <div key={m.id} style={{marginBottom:14}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                <span style={{fontSize:13,fontWeight:600}}>{m.name}</span>
                <span style={{fontSize:12,color:'var(--muted)'}}>{m.count} cycles · {fmtDur(m.mins)}</span>
              </div>
              <div style={{height:7,background:'#f1f5f9',borderRadius:4}}>
                <div style={{height:'100%',width:`${(m.count/mx)*100}%`,background:'var(--navy)',borderRadius:4,transition:'width .5s'}}/>
              </div>
            </div>
          ))}
        </div>
        <div className="card">
          <h3 style={{fontSize:14,fontWeight:700,marginBottom:14}}>Top Users</h3>
          {users.map(u=>({...u,count:history.filter(h=>h.userId===u.id).length})).sort((a,b)=>b.count-a.count).slice(0,6).map(u=>(
            <div key={u.id} style={{display:'flex',alignItems:'center',gap:9,marginBottom:9}}>
              <div className="user-avatar" style={{width:30,height:30,fontSize:11,background:'var(--navy3)'}}>{initials(u.name)}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:600}}>{u.name}</div>
                <div style={{fontSize:11,color:'var(--muted)'}}>{u.department||u.username}</div>
              </div>
              <span className="chip chip-navy">{u.count}</span>
            </div>
          ))}
        </div>
      </div>
      <div className="card">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
          <h3 style={{fontSize:14,fontWeight:700}}>Recent Activity</h3>
          <button className="btn btn-ghost btn-sm" onClick={()=>ctx.setPage('history')}><I n="history" s={14}/>View All</button>
        </div>
        {history.slice(0,8).length?(
          <div className="table-wrap" style={{border:'none'}}>
            <table><thead><tr><th>User</th><th>Machine</th><th>Duration</th><th>Date</th><th>Time</th></tr></thead>
              <tbody>{history.slice(0,8).map(h=>(
                <tr key={h.id}>
                  <td><div style={{display:'flex',alignItems:'center',gap:7}}><div className="user-avatar" style={{width:26,height:26,fontSize:10,background:'var(--navy3)'}}>{initials(h.userName)}</div>{h.userName}</div></td>
                  <td>{h.machineName}</td>
                  <td><span className="chip chip-navy">{fmtDur(h.durationMin)}</span></td>
                  <td style={{color:'var(--muted)'}}>{fmtDate(h.date)}</td>
                  <td style={{color:'var(--muted)'}}>{fmt(h.startTime)}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        ):<div style={{textAlign:'center',color:'var(--muted)',padding:'20px 0',fontSize:13}}>No activity yet</div>}
      </div>
    </div>
  );
};

// ─── MODAL ROUTER ─────────────────────────────────────────────────────────────
const ModalRouter=({ctx})=>{
  const{modal,setModal}=ctx;
  if(!modal)return null;
  if(modal.type==='start')return <StartModal ctx={ctx}/>;
  if(modal.type==='contact')return <ContactModal ctx={ctx}/>;
  return null;
};

// ─── START MACHINE MODAL ──────────────────────────────────────────────────────
const StartModal=({ctx})=>{
  const{modal,setModal,startMachine,sessions}=ctx;
  const[dur,setDur]=useState(null);
  const machine=modal.machine;
  const occupied=sessions[machine.id];

  if(occupied){
    const secs=timeLeft(occupied.endTime);
    return(
      <div className="modal-overlay" onClick={()=>setModal(null)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <div className="modal-header"><span className="modal-title">Machine Occupied</span><button className="close-btn" onClick={()=>setModal(null)}><I n="x" s={13}/></button></div>
          <div className="modal-body">
            <div style={{textAlign:'center',padding:'8px 0 4px'}}>
              <div style={{fontSize:34,marginBottom:10}}>⚠️</div>
              <div style={{fontSize:14,color:'var(--muted)',lineHeight:1.6}}>
                <strong style={{color:'var(--text)'}}>{machine.name}</strong> is currently in use by <strong>{occupied.userName}</strong>.
                {secs>0?<> Finishes in <strong style={{color:'var(--red)'}}>{fmtSecs(secs)}</strong>.</>:<> Cycle has finished but clothes haven't been collected yet.</>}
              </div>
            </div>
          </div>
          <div className="modal-footer"><button className="btn btn-primary" onClick={()=>setModal(null)}>OK</button></div>
        </div>
      </div>
    );
  }

  const sub=()=>{
    if(!dur){toast('Please select a duration','error');return;}
    startMachine(machine.id,machine.name,dur);
    setModal(null);
  };

  return(
    <div className="modal-overlay" onClick={()=>setModal(null)}>
      <div className="modal modal-wide" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div>
            <div className="modal-title">Start {machine.name}</div>
            <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>Select your cycle duration</div>
          </div>
          <button className="close-btn" onClick={()=>setModal(null)}><I n="x" s={13}/></button>
        </div>
        <div className="modal-body">
          <div className="dur-grid">
            {DURATIONS.map(d=>(
              <div key={d.minutes} className={`dur-btn${dur===d.minutes?' selected':''}`} onClick={()=>setDur(d.minutes)}>{d.label}</div>
            ))}
          </div>
          {dur&&(
            <div style={{marginTop:13,padding:'11px 15px',background:'#f0fdf4',borderRadius:10,fontSize:13,color:'#15803d',fontWeight:500,display:'flex',alignItems:'center',gap:8}}>
              <I n="check" s={15}/><span>Selected: <strong>{DURATIONS.find(d=>d.minutes===dur)?.label}</strong> — finishes at {fmt(Date.now()+dur*60000)}</span>
            </div>
          )}
        </div>
        <div className="modal-footer">
          <button className="btn btn-ghost" onClick={()=>setModal(null)}>Cancel</button>
          <button className="btn btn-green btn-lg" onClick={sub} disabled={!dur}><I n="machine" s={16}/>START MACHINE</button>
        </div>
      </div>
    </div>
  );
};

// ─── CONTACT USER MODAL ───────────────────────────────────────────────────────
const ContactModal=({ctx})=>{
  const{modal,setModal}=ctx;
  const{session,machine}=modal;
  const msg=waMsg(session.userName);
  const hasPhone=!!session.userPhone;

  return(
    <div className="modal-overlay" onClick={()=>setModal(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div>
            <div className="modal-title">Contact {session.userName}</div>
            <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>Request clothes collection from {machine.name}</div>
          </div>
          <button className="close-btn" onClick={()=>setModal(null)}><I n="x" s={13}/></button>
        </div>
        <div className="modal-body">
          <div style={{display:'flex',alignItems:'center',gap:11,padding:'12px 14px',background:'var(--surface)',borderRadius:12,marginBottom:16}}>
            <div className="user-avatar" style={{width:42,height:42,fontSize:15,background:'var(--navy3)'}}>{initials(session.userName)}</div>
            <div>
              <div style={{fontSize:14,fontWeight:700}}>{session.userName}</div>
              {session.userPhone?<div style={{fontSize:12,color:'var(--muted)',display:'flex',alignItems:'center',gap:5,marginTop:2}}><I n="phone" s={12}/>{session.userPhone}</div>:<div style={{fontSize:12,color:'var(--light)',marginTop:2}}>No phone number on file</div>}
            </div>
          </div>

          <div style={{fontSize:13,fontWeight:600,marginBottom:8,color:'var(--muted)'}}>Message preview</div>
          <div className="wa-preview">{msg}</div>

          <div style={{marginTop:16,display:'flex',flexDirection:'column',gap:9}}>
            <button className="btn btn-wa" style={{width:'100%',fontSize:14}} onClick={()=>{openWA(session.userPhone,session.userName);setModal(null);}}>
              <I n="wa" s={17}/>{hasPhone?`Open WhatsApp (${session.userPhone})`:'Open WhatsApp (enter number manually)'}
            </button>
            <button className="btn btn-ghost" onClick={()=>setModal(null)} style={{width:'100%'}}>Cancel</button>
          </div>
        </div>
      </div>
    </div>
  );
};

// ─── RENDER ──────────────────────────────────────────────────────────────────
ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
